name: Simulation Regression
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  run-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run sim:run
